; Two-process supervisor for the visual-compare container.
; - `caddy` is the only listener on :80 (reverse-proxy + static SPA)
; - `api` is the Node API on 127.0.0.1:3001 (set by ENV in the Dockerfile)
;
; Both programs inherit env from supervisord, so anything sourced in
; /usr/local/bin/entrypoint.sh (including /config/.env) is visible here.

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid
; Mirror child program logs to supervisord's own stdout/stderr.
loglevel=info

[unix_http_server]
file=/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:caddy]
command=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
autorestart=true
startretries=5
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api]
command=/usr/local/bin/node /app/packages/api/dist/index.js
directory=/app
autorestart=true
startretries=5
stopsignal=TERM
; Give the API a moment to flush SQLite WAL + close Playwright on shutdown.
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
