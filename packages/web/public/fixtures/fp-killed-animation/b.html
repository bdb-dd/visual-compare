<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acme — fp-killed-animation</title>
  <link rel="stylesheet" href="/fixtures/_assets/style.css" />
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero h2,
    .hero p,
    .hero .cta {
      animation: fadeIn 2s ease-out forwards;
      opacity: 0;
    }
    .hero p { animation-delay: 0.4s; }
    .hero .cta { animation-delay: 0.8s; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Acme</h1>
    <nav><a href="#">Shop</a><a href="#">About</a><a href="#">Contact</a></nav>
  </header>
  <section class="hero">
    <h2>Welcome to our store</h2>
    <p>Hand-picked goods, delivered weekly.</p>
    <a class="cta" href="#">Buy Now</a>
  </section>
  <footer class="footer">© Acme 2025</footer>
</body>
</html>
